<!DOCTYPE html>
<html>
<head>
    <title>Dragon Dodger</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #FFFFFF; 
            color: #000000; 
            font-family: 'Press Start 2P', cursive; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin-top: 30px; 
        }
        
        h2 {
            font-size: 36px;
            text-transform: uppercase;
            margin-bottom: 20px;
            text-align: center;
        }

        canvas { 
            background: #FFFFFF; 
        }
        
        .instructions { 
            margin-top: 20px; 
            font-size: 12px;
            line-height: 1.8;
            text-align: center;
        }
        
        #restartBtn {
            display: none; 
            margin-top: 30px;
            padding: 15px 25px;
            font-size: 16px;
            background-color: #000000; 
            color: #FFFFFF; 
            font-family: 'Press Start 2P', cursive; 
            border: none;
            cursor: pointer;
        }

        #restartBtn:hover {
            background-color: #444444; 
        }
    </style>
</head>
<body>
    <h2>DRAGON DODGER</h2>
    <canvas id="gameCanvas" width="1000" height="600"></canvas>
    
    <button id="restartBtn">PLAY AGAIN</button>
    
    <div class="instructions">Use <strong>Arrow Up</strong> and <strong>Arrow Down</strong><br><br>to avoid the magic blasts!</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const restartBtn = document.getElementById('restartBtn');

        // Load Sprite Sheets
        const dragonImg = new Image();
        dragonImg.src = 'dragon.png';

        const blastImg = new Image();
        blastImg.src = 'blast.png';

        // Game State
        let isGameOver = false;
        let score = 0;
        let frameCount = 0;
        let currentLevel = 1;
        
        // Spawning Timers
        let spawnTimer = 0;
        let currentSpawnInterval = 60; 

        // Player (Dragon)
        const dragon = {
            x: 50,
            y: 260, 
            width: 90, 
            height: 90, 
            speed: 6, 
            dy: 0 
        };

        // Obstacles (Magic Blasts)
        let blasts = [];

        // 1. Input Handling
        document.addEventListener('keydown', (e) => {
            if(["ArrowUp","ArrowDown"].indexOf(e.code) > -1) {
                e.preventDefault();
            }
            if (e.key === 'ArrowUp') dragon.dy = -dragon.speed;
            if (e.key === 'ArrowDown') dragon.dy = dragon.speed;
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowUp' && dragon.dy < 0) dragon.dy = 0;
            if (e.key === 'ArrowDown' && dragon.dy > 0) dragon.dy = 0;
        });

        // 2. Update Logic
        function update() {
            if (isGameOver) return;

            dragon.y += dragon.dy;

            // Keep dragon inside canvas bounds AND protect the text area
            const ceiling = 70; 
            if (dragon.y < ceiling) dragon.y = ceiling;
            if (dragon.y + dragon.height > canvas.height) dragon.y = canvas.height - dragon.height;

            frameCount++;
            spawnTimer++;
            
            // Calculate current level
            let secondsAlive = frameCount / 60;
            currentLevel = Math.floor(secondsAlive / 30) + 1;

            if (currentLevel > 1) {
                currentSpawnInterval = Math.max(25, 60 - Math.floor((secondsAlive - 30) * 0.5));
            }

            // Spawn Blasts
            if (spawnTimer >= currentSpawnInterval) { 
                spawnTimer = 0;
                let blastsInWave = Math.floor(Math.random() * 3) + 1;
                
                for (let i = 0; i < blastsInWave; i++) {
                    let scaleModifier = 1.0; 
                    if (currentLevel > 1) {
                        scaleModifier = 0.6 + Math.random() * 1.0; 
                    }

                    // Separation of Visual Size and Physical Hitbox
                    // The drawing size scales normally
                    const blastDrawSize = 45 * scaleModifier; 
                    
                    // The hitbox is a tiny strict radius (just 6 pixels base) that scales up/down
                    const hitboxRadius = 6 * scaleModifier; 
                    
                    const blastY = Math.random() * (canvas.height - ceiling - blastDrawSize) + ceiling + blastDrawSize / 2;
                    
                    let currentSpeed = 6; 
                    if (currentLevel > 1) {
                        let speedIncrease = ((secondsAlive - 30) / 5) * 0.4; 
                        currentSpeed += speedIncrease;
                        if (scaleModifier < 1) currentSpeed += 1.5;
                        if (scaleModifier > 1.3) currentSpeed -= 1.0;
                    }
                    
                    currentSpeed = Math.min(currentSpeed, 12); 
                    let staggerX = Math.random() * 250; 

                    blasts.push({
                        x: canvas.width + staggerX,
                        y: blastY,
                        radius: hitboxRadius, // Used ONLY for collision
                        drawSize: blastDrawSize, // Used ONLY for drawing
                        scale: scaleModifier, 
                        speed: currentSpeed 
                    });
                }
            }

            // Move and Check Collisions (Circle-to-Circle)
            
            // Calculate the exact center of the dragon's chest
            let dragonCenterX = dragon.x + dragon.width / 2;
            let dragonCenterY = dragon.y + dragon.height * 0.55; // Pushed slightly down from true center to avoid the head/wings
            
            // The dragon's vulnerable spot is just 15% of its total width
            let dragonHitRadius = dragon.width * 0.15; 

            for (let i = 0; i < blasts.length; i++) {
                let b = blasts[i];
                b.x -= b.speed;

                // Radial Distance Math (Pythagorean theorem)
                let dx = dragonCenterX - b.x;
                let dy = dragonCenterY - b.y;
                let distance = Math.sqrt(dx * dx + dy * dy);

                // If the distance between the two centers is less than their combined radii, it's a hit
                if (distance < dragonHitRadius + b.radius) {
                    isGameOver = true;
                }
            }

            // Clean up off-screen blasts
            blasts = blasts.filter(b => {
                if (b.x + b.drawSize < 0) {
                    score += 10;
                    return false; 
                }
                return true; 
            });
        }

        // 3. Draw Graphics
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.imageSmoothingEnabled = false; 

            // Dragon Animation
            let dragonCols = 2;
            let dragonRows = 2;
            let dragonFrame = Math.floor(frameCount / 12) % 4; 
            
            let dFrameWidth = dragonImg.width / dragonCols;
            let dFrameHeight = dragonImg.height / dragonRows;
            
            let dSourceX = (dragonFrame % dragonCols) * dFrameWidth;
            let dSourceY = Math.floor(dragonFrame / dragonCols) * dFrameHeight;

            ctx.drawImage(
                dragonImg, 
                dSourceX, dSourceY, dFrameWidth, dFrameHeight, 
                dragon.x, dragon.y, dragon.width, dragon.height  
            );

            // Blast Animation
            let blastCols = 2;
            let blastRows = 2;
            let blastFrame = Math.floor(frameCount / 8) % 4; 
            
            let bFrameWidth = blastImg.width / blastCols;
            let bFrameHeight = blastImg.height / blastRows;
            
            blasts.forEach(b => {
                let bSourceX = (blastFrame % blastCols) * bFrameWidth;
                let bSourceY = Math.floor(blastFrame / blastCols) * bFrameHeight;
                
                // Draw the blast image centered perfectly over the tiny invisible hitbox
                ctx.drawImage(
                    blastImg, 
                    bSourceX, bSourceY, bFrameWidth, bFrameHeight, 
                    b.x - b.drawSize / 2, b.y - b.drawSize / 2, b.drawSize, b.drawSize 
                );
            });

            // UI Texts
            ctx.fillStyle = '#000000';
            ctx.font = '16px "Press Start 2P"';
            ctx.textAlign = 'left';
            ctx.fillText(`SCORE: ${score}`, 10, 30);
            
            ctx.fillStyle = '#F44336';
            ctx.fillText(`LEVEL: ${currentLevel}`, 10, 60);

            // Game Over Screen
            if (isGameOver) {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#F44336';
                ctx.font = '36px "Press Start 2P"';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 + 15);
                
                restartBtn.style.display = 'block'; 
            }
        }

        // 4. Reset Game Logic
        function resetGame() {
            restartBtn.style.display = 'none';
            isGameOver = false;
            score = 0;
            frameCount = 0;
            currentLevel = 1;
            spawnTimer = 0;
            currentSpawnInterval = 60;
            dragon.y = 260; 
            dragon.dy = 0;
            blasts = [];
            gameLoop();
        }

        restartBtn.addEventListener('click', resetGame);

        let assetsLoaded = 0;
        function checkAssetsLoaded() {
            assetsLoaded++;
            if(assetsLoaded === 2) {
                let naturalRatio = dragonImg.height / dragonImg.width;
                dragon.height = dragon.width * naturalRatio;

                document.fonts.ready.then(() => {
                    gameLoop();
                });
            }
        }

        dragonImg.onload = checkAssetsLoaded;
        blastImg.onload = checkAssetsLoaded;

        function gameLoop() {
            update();
            draw();
            if (!isGameOver) {
                requestAnimationFrame(gameLoop);
            }
        }
    </script>
</body>
</html>
